# docker-compose.yml

---
networks:
  traefik_default:
    external: true
  default:
services:

  app:
    build:
      context: ./
    develop:
      watch:
        - action: rebuild
          path: app/
    environment:
      BASE_URL: ${BASE_URL:-localhost}
      BOT_TOKEN: ${BOT_TOKEN:-YOUR_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      DOWNLOAD_ALLOWED_DOMAINS: ${DOWNLOAD_ALLOWED_DOMAINS:-}
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "1m"
    volumes:
      - cache:/tmp/url-fairy-bot-cache/
      - ${GLOBAL_DATA_FOLDER:-/Data}/url-fairy-bot/config:/config
    # ports:
    #   - 8000:8000
    networks:
      - default

  nginx:
    image: nginx:stable-alpine-slim
    environment:
      BASE_URL: ${BASE_URL:-localhost}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      traefik.docker.network: traefik_default
      traefik.enable: true
      traefik.http.routers.url-fairy-bot.entrypoints: websecure
      traefik.http.routers.url-fairy-bot.rule: Host(`${BASE_URL:-localhost}`)
      traefik.http.routers.url-fairy-bot.service: url-fairy-bot
      traefik.http.routers.url-fairy-bot.tls: true
      traefik.http.routers.url-fairy-bot.tls.certresolver: ${LETSENCRYPT_RESOLVER_NAME:-letsencrypt-cloudflare-dns-challenge}
      traefik.http.services.url-fairy-bot.loadbalancer.server.port: 80
    # ports:
    #   - ${PUBLIC_PORT:-80:80}
    logging:
      driver: none
    networks:
      - traefik_default
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d
      - ./nginx/theme/:/theme/:ro
      - cache:/tmp/url-fairy-bot-cache/:ro
  cron:
    image: busybox:stable
    environment:
      FILE_TTL: ${FILE_TTL:-3}
      CRON_INTERVAL: ${CRON_INTERVAL:-3600}
    volumes:
      - cache:/tmp/url-fairy-bot-cache/
    command: >
      sh -c '
        echo "[cron] started, TTL=${FILE_TTL} days, interval=${CRON_INTERVAL}s"

        while true; do
          echo "[cron] $(date) cleanup started"

          DELETED_FILES=$(find /tmp/url-fairy-bot-cache/ -type f -mtime +$FILE_TTL -print -delete | wc -l)
          DELETED_DIRS=$(find /tmp/url-fairy-bot-cache/ -type d -empty -print -delete | wc -l)

          echo "[cron] $(date) deleted files: $DELETED_FILES, empty dirs: $DELETED_DIRS"

          echo "[cron] sleeping ${CRON_INTERVAL}s..."
          sleep $CRON_INTERVAL
        done
      '
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "3"

  # cobalt-api:
  #   image: ghcr.io/imputnet/cobalt:10
  #   restart: unless-stopped
  #   labels:
  #     com.centurylinklabs.watchtower.enable: "true"
  #   networks:
  #     - default
  #   environment:
  #     API_URL: cobalt-api

  test:
    build:
      context: ./
    command: sh -c "poetry install --with dev --no-root && poetry run pytest"
    environment:
      BASE_URL: http://localhost
    volumes:
      - .:/app
    networks:
      - default

volumes:
  cache:
