# docker-compose.yml

---
networks:
  traefik_default:
    external: true
  default:
services:

  app:
    build:
      context: ./
    develop:
      watch:
        - action: rebuild
          path: app/
    environment:
      BASE_URL: ${BASE_URL:-localhost}
      BOT_TOKEN: ${BOT_TOKEN:-YOUR_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-""}
      COOKIE_JAR_ENABLED: ${COOKIE_JAR_ENABLED:-false}
      DOWNLOAD_ALLOWED_DOMAINS: ${DOWNLOAD_ALLOWED_DOMAINS:-}
      INSTAGRAM_REWRITE_ENABLED: ${INSTAGRAM_REWRITE_ENABLED:-true}
      REDDIT_REWRITE_ENABLED: ${REDDIT_REWRITE_ENABLED:-true}
      SPOTIFY_REWRITE_ENABLED: ${SPOTIFY_REWRITE_ENABLED:-true}
      TIKTOK_REWRITE_ENABLED: ${TIKTOK_REWRITE_ENABLED:-true}
      TWITTER_REWRITE_ENABLED: ${TWITTER_REWRITE_ENABLED:-true}
    logging:
      driver: "json-file"
      options:
        max-file: "3"
        max-size: "1m"
    volumes:
      - cache:/tmp/url-fairy-bot-cache/
      - ${GLOBAL_DATA_FOLDER:-/Data}/url-fairy-bot/config:/config
    # ports:
    #   - 8000:8000
    networks:
      - default

  nginx:
    image: nginx:stable-alpine-slim
    environment:
      BASE_URL: ${BASE_URL:-localhost}
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      traefik.docker.network: traefik_default
      traefik.enable: true
      traefik.http.routers.url-fairy-bot.entrypoints: websecure
      traefik.http.routers.url-fairy-bot.rule: Host(`${BASE_URL:-localhost}`)
      traefik.http.routers.url-fairy-bot.service: url-fairy-bot
      traefik.http.routers.url-fairy-bot.tls: true
      traefik.http.routers.url-fairy-bot.tls.certresolver: ${LETSENCRYPT_RESOLVER_NAME:-letsencrypt-cloudflare-dns-challenge}
      traefik.http.services.url-fairy-bot.loadbalancer.server.port: 80
    # ports:
    #   - ${PUBLIC_PORT:-80:80}
    logging:
      driver: none
    networks:
      - traefik_default
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d
      - ./nginx/theme/:/theme/:ro
      - cache:/tmp/url-fairy-bot-cache/:ro
  cleanup:
    image: docker.io/bash:5
    environment:
      FILE_TTL: 3
      CRON_INTERVAL: 3600
      CACHE_DIR: ${CACHE_DIR:-/tmp/url-fairy-bot-cache/}
    volumes:
      - ./cleanup.sh:/cleanup.sh:ro
      - cache:/tmp/url-fairy-bot-cache/
    command:
      - bash
      - cleanup.sh
      - --serve
volumes:
  cache:
